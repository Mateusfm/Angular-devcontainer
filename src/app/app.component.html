<mat-toolbar color="primary" class="topbar">
  <button mat-button (click)="drawer.toggle()" aria-label="Alternar menu lateral">
    Menu
  </button>
  <span>{{ title }}</span>
</mat-toolbar>

<mat-sidenav-container class="layout">
  <mat-sidenav #drawer mode="side" opened>
    <mat-nav-list>
      @for (item of menuItems; track item.label) {
        <a mat-list-item href="#">{{ item.label }}</a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="content">
      <h1>Dashboard</h1>
      <p>Menu superior e lateral usando Angular Material.</p>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
